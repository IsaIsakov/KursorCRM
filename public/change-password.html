<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Смена временного пароля — КУРСОР</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/uploads/mascot/happy.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <img class="mascot-lg" src="/uploads/mascot/thinking.png" alt="Маскот КУРСОР" style="display:block;margin:0 auto 8px">
    <h1>Создайте новый пароль</h1>
    <p>Временный пароль необходимо заменить перед началом работы.</p>
    <form id="changeForm">
      <div class="form-group"><label for="oldPassword">Временный пароль</label><input class="form-input" id="oldPassword" type="password" autocomplete="current-password" required autofocus></div>
      <div class="form-group"><label for="newPassword">Новый пароль — минимум 10 символов</label><input class="form-input" id="newPassword" type="password" minlength="10" autocomplete="new-password" required></div>
      <div class="form-group"><label for="confirmPassword">Повторите новый пароль</label><input class="form-input" id="confirmPassword" type="password" minlength="10" autocomplete="new-password" required></div>
      <button class="btn btn-lg" id="saveBtn" type="submit" style="width:100%">Сохранить и продолжить</button>
    </form>
    <div id="msg" style="margin-top:14px;color:#ef4444;font-weight:700;text-align:center"></div>
    <button class="btn btn-ghost" id="logoutBtn" type="button" style="margin-top:12px;width:100%">Выйти из аккаунта</button>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
const current = API.getCurrentUser();
if (!current || !API.getToken()) location.href = '/index.html';
else if (!current.mustChangePassword) redirectByRole(current.role);

function redirectByRole(role) {
  if (role === 'admin') location.href = '/admin/index.html';
  else if (role === 'teacher' || role === 'assistant') location.href = '/pages/teacher.html';
  else if (role === 'parent') location.href = '/pages/parent.html';
  else location.href = '/pages/dashboard.html';
}

document.getElementById('logoutBtn').onclick = () => { API.logout(); location.href = '/index.html'; };
document.getElementById('changeForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const oldPassword = document.getElementById('oldPassword').value;
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const msg = document.getElementById('msg');
  const button = document.getElementById('saveBtn');
  msg.textContent = '';
  if (newPassword !== confirmPassword) { msg.textContent = 'Новые пароли не совпадают'; return; }
  button.disabled = true;
  try {
    await API._request('POST', '/api/auth/change-password', { oldPassword, newPassword });
    const user = { ...current, mustChangePassword: false };
    localStorage.setItem('kursor_user_cache', JSON.stringify(user));
    redirectByRole(user.role);
  } catch (error) {
    msg.textContent = error.message;
    button.disabled = false;
  }
});
</script>
</body>
</html>
