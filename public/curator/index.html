<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Кабинет куратора — KURSOR</title><link rel="stylesheet" href="/css/style.css?v=12"><style>
:root{--cu:#5b5ce2;--cu-bg:#f4f6fb}.cu-shell{min-height:100vh;background:var(--cu-bg);display:grid;grid-template-columns:250px 1fr}.cu-side{background:#172033;color:#fff;padding:22px 14px;position:sticky;top:0;height:100vh}.cu-logo{font-size:25px;font-weight:900;letter-spacing:3px;padding:0 12px 22px}.cu-branch{width:100%;margin-bottom:18px;background:#263249;color:#fff;border:1px solid #3a4760}.cu-nav{display:grid;gap:5px}.cu-nav button{border:0;background:transparent;color:#cbd5e1;text-align:left;padding:12px 14px;border-radius:10px;font:inherit;font-weight:700;cursor:pointer}.cu-nav button.active,.cu-nav button:hover{background:#303d57;color:#fff}.cu-main{min-width:0}.cu-top{height:74px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:8}.cu-content{padding:25px;max-width:1500px;margin:auto}.cu-title{display:flex;align-items:flex-start;justify-content:space-between;gap:15px;margin-bottom:18px}.cu-title h1{margin:0}.cu-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.cu-stat{background:#fff;border:1px solid #e6eaf2;border-radius:15px;padding:17px}.cu-stat b{font-size:28px;display:block}.cu-card{background:#fff;border:1px solid #e6eaf2;border-radius:15px;padding:16px}.cu-table{width:100%;border-collapse:collapse;background:#fff}.cu-table th,.cu-table td{padding:10px;border-bottom:1px solid #edf0f5;text-align:left;font-size:13px}.tag{display:inline-flex;padding:5px 9px;border-radius:99px;font-size:11px;font-weight:900}.tag.debtor{background:#fee2e2;color:#b91c1c}.tag.at_risk{background:#ffedd5;color:#c2410c}.tag.absence{background:#fef9c3;color:#a16207}.case-row{display:grid;grid-template-columns:150px minmax(180px,1fr) 150px 160px 180px;gap:10px;align-items:center;padding:12px;border-bottom:1px solid #edf0f5}.lesson-row-cu{display:grid;grid-template-columns:110px 1fr 180px 130px;gap:10px;padding:13px;border-left:5px solid #22c55e;margin-bottom:7px;background:#fff;border-radius:10px}.lesson-row-cu.unmarked{border-left-color:#ef4444;background:#fff1f2}.score{display:inline-grid;place-items:center;width:29px;height:29px;border-radius:50%;font-weight:900;color:#fff}.score.class{background:#8b5cf6}.score.hw{background:#22c55e}.homework-checking{background:#ccfbf1;color:#0f766e;padding:5px 8px;border-radius:9px;font-weight:800}.cu-bell{position:relative;border:0;background:#f1f5f9;border-radius:50%;width:42px;height:42px;font-size:20px;cursor:pointer}.cu-count{position:absolute;right:-4px;top:-4px;background:#ef4444;color:#fff;font-size:10px;border-radius:99px;padding:3px 6px}.mobile-menu{display:none}.empty{padding:35px;text-align:center;color:#94a3b8}.cu-modal{max-width:1000px}.student-hero{display:flex;gap:16px;align-items:center;background:linear-gradient(135deg,#eef2ff,#ecfeff);padding:18px;border-radius:15px}.student-photo{width:76px;height:76px;border-radius:50%;object-fit:cover;background:#6366f1;color:#fff;display:grid;place-items:center;font-size:27px;font-weight:900}.attendance-dots{display:flex;gap:5px;flex-wrap:wrap}.adot{width:48px;padding:5px 2px;border-radius:8px;text-align:center;font-size:10px}.adot.present,.adot.late{background:#dcfce7;color:#166534}.adot.absent{background:#fee2e2;color:#991b1b}.adot.excused{background:#dbeafe;color:#1e40af}
.student-overview-grid{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(260px,.8fr);gap:12px}
@media(max-width:900px){.cu-shell{grid-template-columns:1fr}.cu-side{position:fixed;left:-270px;z-index:30;width:240px;transition:.2s}.cu-shell.menu .cu-side{left:0}.mobile-menu{display:block}.cu-grid{grid-template-columns:repeat(2,1fr)}.case-row{grid-template-columns:1fr 1fr}.lesson-row-cu{grid-template-columns:90px 1fr}.cu-content{padding:15px}.cu-top{padding:0 14px}.student-overview-grid{grid-template-columns:1fr}}@media(max-width:520px){.cu-grid{grid-template-columns:1fr}.case-row{grid-template-columns:1fr}.cu-title{display:block}.cu-table{display:block;overflow:auto;white-space:nowrap}.student-hero{align-items:flex-start;flex-wrap:wrap}}
</style></head><body><div class="cu-shell" id="shell"><aside class="cu-side"><div class="cu-logo">KURSOR</div><select id="branchSelect" class="form-input cu-branch" onchange="branchChanged()"></select><nav class="cu-nav"><button data-tab="lessons" onclick="showTab('lessons')">📅 Уроки</button><button data-tab="students" onclick="showTab('students')">👨‍🎓 Студенты</button><button data-tab="groups" onclick="showTab('groups')">👥 Группы</button><button data-tab="cases" onclick="showTab('cases')">🎯 Задачник куратора</button><button data-tab="homework" onclick="showTab('homework')">📚 ДЗ и проекты</button><button data-tab="reports" onclick="showTab('reports')">📊 Отчёты</button></nav></aside><main class="cu-main"><header class="cu-top"><div style="display:flex;gap:10px;align-items:center"><button class="btn btn-ghost mobile-menu" onclick="document.getElementById('shell').classList.toggle('menu')">☰</button><b id="branchTitle">Кабинет куратора</b></div><div style="display:flex;gap:12px;align-items:center"><button class="cu-bell" onclick="openNotifications()">🔔<span class="cu-count" id="bellCount" style="display:none"></span></button><span id="curatorName"></span><button class="btn btn-ghost" onclick="logout()">Выйти</button></div></header><div class="cu-content" id="content"></div></main></div><div id="modal" class="modal-overlay"><div class="modal cu-modal" id="modalContent"></div></div>
<script src="/js/i18n.js?v=12"></script><script src="/js/api.js?v=12"></script><script src="/js/app.js?v=12"></script><script>
const user=requireAuth(['curator','admin']);let boot={branches:[],stats:{}},tab=(location.hash||'#lessons').slice(1),branchId='',cache={};
const esc=escapeHtml,fmt=d=>d?new Date(Number(d)).toLocaleDateString('ru-RU'):'—',money=n=>new Intl.NumberFormat('ru-RU').format(n||0)+' ₸';
if(user)init();async function init(){document.getElementById('curatorName').textContent=user.name;boot=await API._request('GET','/api/curator/bootstrap');branchId=boot.branches[0]?.id||'';document.getElementById('branchSelect').innerHTML=boot.branches.length?boot.branches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join(''):'<option>Филиал не назначен</option>';if(!boot.branches.length){content.innerHTML='<div class="cu-card empty">Администратор ещё не назначил вам филиал.</div>';return}loadBell();showTab(tab);}
function branchChanged(){branchId=document.getElementById('branchSelect').value;cache={};showTab(tab)}function showTab(name){tab=name;location.hash=name;document.querySelectorAll('.cu-nav button').forEach(x=>x.classList.toggle('active',x.dataset.tab===name));document.getElementById('shell').classList.remove('menu');({lessons:renderLessons,students:renderStudents,groups:renderGroups,cases:renderCases,homework:renderHomework,reports:renderReports}[name]||renderLessons)()}
async function loadBell(){const n=await API.getNotifications().catch(()=>({unread:0}));const b=document.getElementById('bellCount');b.textContent=n.unread;b.style.display=n.unread?'block':'none'}async function openNotifications(){const n=await API.getNotifications();modalContent.innerHTML=`<h2>Срочные уведомления</h2>${n.items.length?n.items.map(x=>`<a href="${x.link||'#'}" onclick="API.markNotifRead('${x.id}');closeModal()" style="display:block;padding:12px;border-bottom:1px solid #eee;color:inherit;text-decoration:none"><b>${esc(x.text)}</b><br><small>${fmt(x.createdAt)}</small></a>`).join(''):'<div class="empty">Новых уведомлений нет</div>'}<div class="modal-actions"><button class="btn" onclick="closeModal()">Закрыть</button></div>`;modal.classList.add('active')}
async function renderLessons(){content.innerHTML='<div class="empty">Загружаем расписание…</div>';const now=new Date(),monday=new Date(now);monday.setDate(now.getDate()-((now.getDay()+6)%7));const from=monday.toISOString().slice(0,10),to=new Date(monday.getTime()+6*86400000).toISOString().slice(0,10);const rows=await API._request('GET',`/api/curator/calendar?branchId=${branchId}&from=${from}&to=${to}`);content.innerHTML=`<div class="cu-title"><div><h1>Уроки филиала</h1><p>Актуальное расписание. Неотмеченные пары выделены красным.</p></div><button class="btn btn-outline" onclick="renderLessons()">Обновить</button></div>${rows.length?rows.map(x=>`<div class="lesson-row-cu ${x.unmarked?'unmarked':''}"><b>${new Date(x.date+'T00:00:00').toLocaleDateString('ru-RU',{weekday:'short',day:'2-digit',month:'2-digit'})}<br>${x.startTime}</b><div><strong>${esc(x.groupName)}</strong><br><small>${esc(x.teacherName||'Преподаватель не назначен')} · ${x.lessonKind==='extra'?'дополнительный':'основной'}</small></div><span>${x.durationMin} минут</span><b style="color:${x.unmarked?'#dc2626':x.marked?'#16a34a':'#64748b'}">${x.unmarked?'Не отмечен':x.marked?'Проведён':'Запланирован'}</b></div>`).join(''):'<div class="cu-card empty">На этой неделе занятий нет</div>'}`}
async function renderStudents(){const rows=await API._request('GET','/api/curator/students');cache.students=rows.filter(x=>x.branch_id===branchId);content.innerHTML=`<div class="cu-title"><div><h1>Студенты</h1><p>Контакты, оплаты, расписание и успеваемость.</p></div><input class="form-input" style="max-width:300px" placeholder="Поиск студента" oninput="filterStudents(this.value)"></div><div class="cu-card" style="overflow:auto"><table class="cu-table" id="studentsTable"><thead><tr><th>Студент</th><th>Группа</th><th>Родитель</th><th>Телефон</th><th>Остаток</th><th></th></tr></thead><tbody>${cache.students.map(s=>`<tr data-search="${esc((s.full_name+' '+(s.parent_name||'')+' '+(s.parent_phone||'')).toLowerCase())}"><td><b>${esc(s.full_name)}</b></td><td>${esc(s.groups||'—')}</td><td>${esc(s.parent_name||'—')}</td><td><a href="tel:${esc(s.parent_phone||'')}">${esc(s.parent_phone||'—')}</a></td><td style="color:${s.visits_left<=2?'#dc2626':'#16a34a'};font-weight:900">${s.visits_left}</td><td><button class="btn btn-sm" onclick="openStudent('${s.user_id}')">Открыть</button></td></tr>`).join('')}</tbody></table></div>`}function filterStudents(q){q=q.toLowerCase();document.querySelectorAll('#studentsTable tbody tr').forEach(x=>x.style.display=x.dataset.search.includes(q)?'':'none')}
async function openStudent(id){modalContent.innerHTML='<div class="empty">Загружаем карточку…</div>';modal.classList.add('active');const o=await API._request('GET','/api/curator/students/'+id),s=o.student,initials=s.full_name.split(/\s+/).slice(0,2).map(x=>x[0]).join('');modalContent.innerHTML=`<div class="student-hero">${s.avatar_url?`<img class="student-photo" src="${esc(s.avatar_url)}">`:`<div class="student-photo">${esc(initials)}</div>`}<div style="flex:1"><h2 style="margin:0">${esc(s.full_name)}</h2><div>${s.birth_date?'Дата рождения: '+esc(s.birth_date):s.age?s.age+' лет':'Дата рождения не указана'} · ${esc(s.branch_name||'')}</div><small>${esc(s.student_email||'Email не указан')} · ${esc(s.student_phone||'Телефон студента не указан')}</small></div><div><b style="font-size:28px">${o.attendancePercent}%</b><br><small>посещаемость</small></div></div><div class="student-overview-grid" style="margin-top:14px"><section><div class="cu-card"><b>График посещений и оценки</b><div class="attendance-dots" style="margin-top:10px">${o.attendance.length?o.attendance.map(a=>`<span class="adot ${a.status}" title="${esc(a.group_name+' '+(a.private_comment||''))}">${fmt(a.date)}<br>${a.class_score?`<i class="score class">${a.class_score}</i>`:''}${a.homework_score?`<i class="score hw">${a.homework_score}</i>`:''}</span>`).join(''):'Нет проведённых уроков'}</div><p><small>Фиолетовый — работа на уроке, зелёный — домашняя работа.</small></p></div><div class="cu-card" style="margin-top:10px"><b>Отзывы преподавателей</b>${o.feedback.length?o.feedback.map(f=>`<p>${esc(f.text)}<br><small>${esc(f.teacher_name||'')} · ${fmt(f.created_at)}</small></p>`).join(''):'<p>Отзывов нет</p>'}</div></section><aside><div class="cu-card"><b>Контакты</b><p>Родитель: ${esc(s.parent_name||'—')}<br><a href="tel:${esc(s.parent_phone||'')}">${esc(s.parent_phone||'—')}</a></p></div><div class="cu-card" style="margin-top:10px"><b>Группы и расписание</b>${o.schedules.map(x=>`<p>${['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][x.weekday]} · ${esc(x.group_name)}<br><b>${x.start_time}, ${x.duration_min} мин.</b></p>`).join('')||'Не назначено'}</div><div class="cu-card" style="margin-top:10px"><b>Оплаты</b>${o.payments.map(p=>`<p>${fmt(p.paid_at)} — <b>${money(p.amount)}</b></p>`).join('')||'<p>Платежей нет</p>'}${s.next_payment_at?`<hr><p>Следующий платёж: <b>${fmt(s.next_payment_at)}</b><br>${money(s.next_payment_amount)}</p>`:''}</div></aside></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Закрыть</button></div>`}
async function renderGroups(){const rows=(await API._request('GET','/api/curator/groups')).filter(x=>x.branch_id===branchId);content.innerHTML=`<div class="cu-title"><div><h1>Группы</h1><p>Актуальные группы филиала и преподаватели.</p></div></div><div class="cu-grid">${rows.map(g=>`<div class="cu-card"><span class="tag ${g.lesson_kind==='extra'?'absence':'at_risk'}">${g.lesson_kind==='extra'?'Дополнительный':'Основной'}</span><h3>${esc(g.name)}</h3><p>${esc(g.teacher_name||'Преподаватель не назначен')}</p><b>${g.member_count} студентов</b></div>`).join('')||'<div class="empty">Групп нет</div>'}</div>`}
async function renderCases(){const rows=(await API._request('GET','/api/curator/cases')).filter(x=>x.branch_id===branchId),labels={debtor:'Должник',at_risk:'Неуспевающий студент',absence:'Отсутствие'};content.innerHTML=`<div class="cu-title"><div><h1>ЗАДАЧНИК куратора</h1><p>Одновременно в работе может находиться только один клиент.</p></div></div><div class="cu-grid" style="margin-bottom:15px"><div class="cu-stat"><b>${rows.filter(x=>x.status==='new').length}</b>Новые</div><div class="cu-stat"><b>${rows.filter(x=>x.status==='in_progress').length}</b>В работе</div><div class="cu-stat"><b>${rows.filter(x=>x.status==='follow_up').length}</b>Повторная связь</div><div class="cu-stat"><b>${rows.filter(x=>x.status==='resolved').length}</b>Завершено</div></div><div class="cu-card" style="padding:0">${rows.length?rows.map(c=>`<div class="case-row"><span class="tag ${c.category}">${labels[c.category]}</span><div><b>${esc(c.full_name)}</b><br><small>${esc(c.description||'')}<br>Появился: ${fmt(c.created_at)}</small></div><span>${c.taken_at?'Взят: '+fmt(c.taken_at):'Не взят'}</span><span>${c.resolved_at?'Закрыт: '+fmt(c.resolved_at):c.next_contact_at?'Связь: '+fmt(c.next_contact_at):''}</span><button class="btn btn-sm" onclick="openCase('${c.id}','${c.status}','${esc(c.full_name)}')">${c.status==='in_progress'?'Завершить контакт':c.status==='resolved'?'История':'Взять в работу'}</button></div>`).join(''):'<div class="empty">Активных задач нет</div>'}</div>`}
async function openCase(id,status,name){if(status==='new'||status==='follow_up'){modalContent.innerHTML=`<h2>${esc(name)}</h2><p>После нажатия вы не сможете взять другого клиента, пока не завершите этот контакт.</p><textarea class="form-input" id="takeComment" placeholder="Комментарий перед звонком"></textarea><div id="modalErr" class="form-error"></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Отмена</button><button class="btn" onclick="takeCase('${id}')">Взял в работу</button></div>`}else if(status==='in_progress'){const max=new Date(Date.now()+14*86400000).toISOString().slice(0,10);modalContent.innerHTML=`<h2>Результат связи: ${esc(name)}</h2><textarea class="form-input" id="caseComment" rows="4" placeholder="Подробный комментарий, минимум 5 символов"></textarea><div class="form-group"><label>Дата следующей связи</label><input class="form-input" id="caseNext" type="date" min="${new Date(Date.now()+86400000).toISOString().slice(0,10)}" max="${max}"></div><div id="modalErr" class="form-error"></div><div class="modal-actions"><button class="btn btn-success" onclick="completeCase('${id}','resolved')">Проблема решена</button><button class="btn" onclick="completeCase('${id}','follow_up')">Назначить повторную связь</button></div>`}else{const events=await API._request('GET','/api/curator/cases/'+id+'/events');modalContent.innerHTML=`<h2>История работы</h2>${events.map(e=>`<p><b>${esc(e.actor_name)} — ${esc(e.action)}</b><br>${esc(e.comment||'')}<br><small>${fmt(e.created_at)}</small></p>`).join('')}<button class="btn" onclick="closeModal()">Закрыть</button>`}modal.classList.add('active')}
async function takeCase(id){try{await API._request('POST',`/api/curator/cases/${id}/take`,{comment:takeComment.value});closeModal();renderCases()}catch(e){modalErr.textContent=e.message}}async function completeCase(id,outcome){try{const next=caseNext.value?new Date(caseNext.value+'T12:00:00').getTime():null;await API._request('POST',`/api/curator/cases/${id}/complete`,{comment:caseComment.value,outcome,nextContactAt:next});closeModal();renderCases()}catch(e){modalErr.textContent=e.message}}
async function renderHomework(){const rows=(await API._request('GET','/api/curator/homework')).filter(x=>x.branch_id===branchId);content.innerHTML=`<div class="cu-title"><div><h1>Домашние задания и проектные работы</h1><p>Оценки, статус проверки и закрытые комментарии преподавателя.</p></div><select class="form-input" style="max-width:250px" onchange="filterHomework(this.value)"><option value="">Все группы</option>${[...new Map(rows.map(x=>[x.group_id,x.group_name])).entries()].map(([id,n])=>`<option value="${id}">${esc(n)}</option>`).join('')}</select></div><div class="cu-card" style="overflow:auto"><table class="cu-table" id="hwTable"><thead><tr><th>Дата</th><th>Группа / преподаватель</th><th>Студент</th><th>За урок</th><th>За ДЗ</th><th>Статус ДЗ</th><th>Комментарий</th></tr></thead><tbody>${rows.map(x=>`<tr data-group="${x.group_id}"><td>${fmt(x.lesson_date)}</td><td><b>${esc(x.group_name)}</b><br>${esc(x.teacher_name||'—')}</td><td>${esc(x.student_name)}</td><td>${x.class_score?`<span class="score class">${x.class_score}</span>`:'—'}</td><td>${x.homework_score?`<span class="score hw">${x.homework_score}</span>`:'—'}</td><td>${x.homework_status==='checking'?'<span class="homework-checking">На проверке</span>':esc(x.homework_status||x.status||'—')}</td><td>${esc(x.private_comment||'—')}</td></tr>`).join('')}</tbody></table></div>`}function filterHomework(id){document.querySelectorAll('#hwTable tbody tr').forEach(x=>x.style.display=!id||x.dataset.group===id?'':'none')}
function renderReports(){content.innerHTML=`<div class="cu-title"><div><h1>Отчёты</h1><p>По группе или всем студентам филиала.</p></div></div><div class="cu-grid"><button class="cu-card" style="text-align:left;cursor:pointer" onclick="loadReport('attendance')"><h3>Посещаемость</h3><p>Количество уроков и процент присутствия.</p></button><button class="cu-card" style="text-align:left;cursor:pointer" onclick="loadReport('performance')"><h3>Успеваемость</h3><p>Средние оценки за урок и домашнюю работу.</p></button></div><div id="reportBox" style="margin-top:15px"></div>`}async function loadReport(type){const rows=await API._request('GET',`/api/curator/reports/${type}?branchId=${branchId}`);cache.report=rows;const cols=rows.length?Object.keys(rows[0]):[];reportBox.innerHTML=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn btn-outline" onclick="downloadReport()">Скачать CSV</button></div><div class="cu-card" style="overflow:auto"><table class="cu-table"><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c]??'—')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}function downloadReport(){const rows=cache.report||[];if(!rows.length)return;const cols=Object.keys(rows[0]),csv='\ufeff'+[cols.join(';'),...rows.map(r=>cols.map(c=>'"'+String(r[c]??'').replace(/"/g,'""')+'"').join(';'))].join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='kursor-report.csv';a.click();URL.revokeObjectURL(a.href)}
function closeModal(){modal.classList.remove('active')}function logout(){API.logout();location.href='/'}
</script></body></html>
