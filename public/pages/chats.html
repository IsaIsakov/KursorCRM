<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Чаты — KURSOR</title><link rel="stylesheet" href="/css/style.css?v=12">
<style>
body{background:#f4f7fb}.chat-shell{display:grid;grid-template-columns:340px minmax(0,1fr);height:calc(100vh - 96px);max-width:1280px;margin:18px auto;background:#fff;border:1px solid #e5e7eb;border-radius:22px;overflow:hidden;box-shadow:0 18px 50px rgba(30,41,59,.09)}
.chat-list{border-right:1px solid #e5e7eb;overflow:auto}.chat-head{padding:22px;border-bottom:1px solid #eef2f7}.chat-head h1{font-size:23px;margin:0 0 5px}.chat-head p{font-size:13px;color:#64748b;margin:0}.chat-section{padding:14px 12px 4px;font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em}.chat-item{width:100%;border:0;background:transparent;text-align:left;padding:13px 16px;display:grid;grid-template-columns:44px 1fr auto;gap:11px;cursor:pointer}.chat-item:hover,.chat-item.active{background:#eef2ff}.chat-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:grid;place-items:center;color:#fff;font-weight:800}.chat-name{font-weight:800;color:#172033}.chat-preview{font-size:12px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:205px}.unread{background:#ef4444;color:white;border-radius:999px;min-width:21px;height:21px;padding:0 6px;display:grid;place-items:center;font-size:11px;font-weight:800}.chat-main{display:flex;flex-direction:column;min-width:0}.channel-head{padding:17px 22px;border-bottom:1px solid #e5e7eb}.channel-title{font-size:17px;font-weight:800}.channel-sub{font-size:12px;color:#64748b}.messages{flex:1;overflow:auto;padding:22px;background:linear-gradient(#fafbff,#f8fafc);display:flex;flex-direction:column;gap:8px}.msg{max-width:min(70%,650px);padding:10px 13px;border-radius:16px 16px 16px 4px;background:#fff;border:1px solid #e5e7eb;align-self:flex-start}.msg.mine{align-self:flex-end;background:#6366f1;color:#fff;border-color:#6366f1;border-radius:16px 16px 4px 16px}.msg-meta{font-size:11px;font-weight:800;margin-bottom:3px;color:#6366f1}.msg.mine .msg-meta{color:#dfe1ff}.msg-time{font-size:10px;opacity:.65;margin-top:4px;text-align:right}.composer{display:flex;gap:10px;padding:14px 18px;border-top:1px solid #e5e7eb}.composer textarea{flex:1;resize:none;border:1px solid #dbe1ea;border-radius:14px;padding:11px 14px;font:inherit;min-height:46px;max-height:130px}.empty-chat{height:100%;display:grid;place-items:center;text-align:center;color:#64748b;padding:30px}.new-thread{margin:12px;width:calc(100% - 24px)}
@media(max-width:760px){
  .chat-shell{grid-template-columns:1fr;height:calc(100dvh - 126px);min-height:420px;margin:0;border-radius:0;border-left:0;border-right:0}
  .chat-list.hidden-mobile{display:none}.chat-main{display:none;min-height:0}.chat-main.open{display:flex}.chat-item{grid-template-columns:42px 1fr auto}.msg{max-width:86%}.back-chat{display:inline-flex!important}
  .chat-head{padding:15px 16px}.chat-head h1{font-size:20px}.messages{padding:14px 10px}.composer{padding:10px 10px calc(10px + env(safe-area-inset-bottom));align-items:flex-end}.composer textarea{font-size:16px;min-height:46px}.composer .btn{padding:10px 13px;min-width:0}
  .channel-head{padding:11px 12px}.channel-title{font-size:15px}.new-thread{min-height:44px}
}
</style></head><body><div id="nav"></div><div id="root"></div>
<script src="/data/database.js?v=12"></script><script src="/js/i18n.js?v=12"></script><script src="/js/api.js?v=12"></script><script src="/js/app.js?v=12"></script>
<script>
const user=requireAuth(['teacher','student','parent']);let chatData={groups:[],threads:[]},active=null,ws=null;
if(user)init();
async function init(){document.getElementById('nav').innerHTML=renderNavbar('chats');document.getElementById('root').innerHTML='<div class="chat-shell"><div class="empty-chat">Загружаем чаты…</div></div>';try{chatData=await API.getChats();renderShell();connect();}catch(e){document.getElementById('root').innerHTML=`<div class="card" style="margin:30px;padding:25px;color:#ef4444">${escapeHtml(e.message)}</div>`}}
function renderShell(){document.getElementById('root').innerHTML=`<div class="chat-shell"><aside class="chat-list" id="chatList"><div class="chat-head"><h1>${user.role==='parent'?'Связь с преподавателем':'Чаты'}</h1><p>${user.role==='parent'?'Личные вопросы о ребёнке':'Общение по учебным группам'}</p></div>${user.role==='parent'?'<button class="btn btn-primary new-thread" onclick="newThread()">＋ Новый вопрос</button>':''}${listHtml()}</aside><main class="chat-main" id="chatMain"><div class="empty-chat"><div><div style="font-size:46px">💬</div><h2>Выберите чат</h2><p>Сообщения доступны только участникам</p></div></div></main></div>`;}
function listHtml(){let out='';if(chatData.groups.length){out+='<div class="chat-section">Группы</div>'+chatData.groups.map(c=>item(c,'group',c.name,'Преподаватель: '+(c.teacher_name||'не назначен'))).join('')}if(chatData.threads.length){out+='<div class="chat-section">Личные обращения</div>'+chatData.threads.map(c=>item(c,'parent_thread',c.subject,(user.role==='parent'?c.teacherName:c.parentName)+' · '+c.studentName)).join('')}return out||'<div style="padding:28px;color:#64748b;text-align:center">Доступных чатов пока нет</div>'}
function item(c,type,title,sub){return `<button class="chat-item" data-key="${type}:${c.id}" onclick="openChat('${type}','${c.id}')"><span class="chat-avatar">${type==='group'?'Г':'Л'}</span><span style="min-width:0"><span class="chat-name">${escapeHtml(title)}</span><div class="chat-preview">${escapeHtml(c.lastMessage||sub||'Сообщений пока нет')}</div></span>${c.unread?`<span class="unread">${c.unread}</span>`:''}</button>`}
async function openChat(type,id){active={type,id};document.querySelectorAll('.chat-item').forEach(x=>x.classList.toggle('active',x.dataset.key===type+':'+id));document.getElementById('chatList').classList.add('hidden-mobile');const main=document.getElementById('chatMain');main.classList.add('open');main.innerHTML='<div class="empty-chat">Загружаем…</div>';try{const data=type==='group'?await API.getGroupMessages(id):await API.getParentThreadMessages(id);const meta=type==='group'?chatData.groups.find(x=>x.id===id):chatData.threads.find(x=>x.id===id);main.innerHTML=`<div class="channel-head"><button class="btn btn-sm back-chat" style="display:none;margin-right:8px" onclick="backToChats()">←</button><span class="channel-title">${escapeHtml(type==='group'?meta.name:meta.subject)}</span><div class="channel-sub">${type==='group'?'Групповой чат: преподаватель и ученики':'Приватно: родитель и преподаватель'}</div></div><div class="messages" id="messages">${data.messages.map(messageHtml).join('')||'<div class="empty-chat">Начните общение — история появится здесь</div>'}</div><form class="composer" onsubmit="sendMessage(event)"><textarea id="messageText" maxlength="4000" placeholder="Напишите сообщение…" onkeydown="sendHotkey(event)"></textarea><button class="btn btn-primary" type="submit">Отправить</button></form>`;scrollBottom();reloadList();}catch(e){main.innerHTML=`<div class="empty-chat" style="color:#ef4444">${escapeHtml(e.message)}</div>`}}
function messageHtml(m){return `<div class="msg ${m.sender.id===user.id?'mine':''}" data-message="${m.id}"><div class="msg-meta">${escapeHtml(m.sender.name)}</div><div>${escapeHtml(m.body).replace(/\n/g,'<br>')}</div><div class="msg-time">${new Date(m.createdAt).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div></div>`}
async function sendMessage(e){e.preventDefault();const box=document.getElementById('messageText'),body=box.value.trim();if(!body||!active)return;box.disabled=true;try{const m=active.type==='group'?await API.sendGroupMessage(active.id,body):await API.sendParentThreadMessage(active.id,body);if(!document.querySelector(`[data-message="${m.id}"]`)){document.querySelector('.empty-chat')?.remove();document.getElementById('messages').insertAdjacentHTML('beforeend',messageHtml(m));}box.value='';scrollBottom();}catch(err){alert(err.message)}finally{box.disabled=false;box.focus()}}
function sendHotkey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();e.target.form.requestSubmit()}}
function scrollBottom(){const box=document.getElementById('messages');if(box)box.scrollTop=box.scrollHeight}
function backToChats(){document.getElementById('chatList').classList.remove('hidden-mobile');document.getElementById('chatMain').classList.remove('open')}
async function reloadList(){try{chatData=await API.getChats()}catch{}}
async function newThread(){const contacts=chatData.contacts||[];if(!contacts.length)return alert('У ребёнка пока нет группы с назначенным преподавателем');let contact=contacts.length===1?contacts[0]:null;if(!contact){const answer=prompt('Выберите преподавателя:\n'+contacts.map((c,i)=>`${i+1}. ${c.studentName} — ${c.groupName}, ${c.teacherName}`).join('\n'));contact=contacts[Number(answer)-1];if(!contact)return}const subject=prompt(`Тема вопроса для ${contact.teacherName}:`,'Вопрос по обучению');if(!subject)return;try{const t=await API.createParentThread({studentId:contact.studentId,teacherId:contact.teacherId,subject});chatData=await API.getChats();renderShell();openChat('parent_thread',t.id)}catch(e){alert(e.message)}}
function connect(){ws=API.connectWS(msg=>{if(msg.type!=='chat_message')return;if(active&&active.type===msg.channelType&&active.id===msg.channelId&&!document.querySelector(`[data-message="${msg.message.id}"]`)){document.querySelector('.empty-chat')?.remove();document.getElementById('messages')?.insertAdjacentHTML('beforeend',messageHtml(msg.message));scrollBottom()}else{reloadList().then(()=>{const list=document.getElementById('chatList');if(list){const head=list.querySelector('.chat-head').outerHTML;const btn=user.role==='parent'?'<button class="btn btn-primary new-thread" onclick="newThread()">＋ Новый вопрос</button>':'';list.innerHTML=head+btn+listHtml()}})}})}
</script></body></html>
